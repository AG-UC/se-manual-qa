<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SE-2686 — SST test page</title>

  <!--
    Fires a GA-protocol /g/collect request to sst.<evaluated-host>. When DEA
    evaluates ag-uc.github.io/se-manual-qa/se-2686/sst/, the SST pattern
    matches against sst.ag-uc.github.io:
        https?://sst.[^/]+/g/collect?v=

    Note: sst.ag-uc.github.io has no DNS record — the request fails at
    resolution time. That is fine. Playwright's page.Request event fires
    when the BROWSER INITIATES the request, before the network attempt, so
    the URL is captured regardless.

    Expected DEA classification: tagDeliveryMethod = SST
  -->

  <script>
    (function() {
      const img = new Image();
      img.src = 'https://sst.ag-uc.github.io/g/collect?v=2&tid=G-TESTSST&cid=' + Date.now() + '&en=page_view';
    })();
  </script>
</head>
<body style="font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem;">
  <h1>SE-2686 — SST</h1>
  <p>This page fires a request to <code>https://sst.ag-uc.github.io/g/collect?v=2&amp;...</code> on load. DEA should classify <code>tagDeliveryMethod = SST</code>.</p>
  <p>The <code>sst.ag-uc.github.io</code> host does not resolve — that's fine. The interceptor captures the URL at request-initiation time, before DNS.</p>
</body>
</html>
